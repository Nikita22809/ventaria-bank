<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventaria Bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #4a6fa5;
            --success-color: #28a745;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: var(--accent-color); margin-bottom: 20px; }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--accent-color);
            font-weight: 600;
            padding: 5px 10px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .profile-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .profile-box p { margin: 5px 0; font-size: 14px; }
        .profile-box span { font-weight: bold; color: var(--accent-color); }

        .balance { font-size: 28px; font-weight: bold; margin: 15px 0; color: #2b2b2b; }

        .donate-section {
            background: #fff;
            border: 1px dashed var(--accent-color);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        .btn-action {
            width: 100%;
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .history-item {
            background: #f1f3f5;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>VNT Банк</h2>
    
    <div class="nav-bar">
        <button class="nav-btn" onclick="switchTab('main')">Главная</button>
        <button class="nav-btn" onclick="switchTab('history')">История</button>
    </div>

    <div id="tab-main" class="tab-content active">
        
        <div class="profile-box">
            <p>Пользователь: <span id="username-display">Загрузка...</span></p>
            <p>ID: <span id="userid-display">00000000</span></p>
        </div>

        <p>Ваш баланс:</p>
        <div class="balance"><span id="balance-value">0</span> VNT</div>

        <div class="donate-section">
            <h4>Пополнение баланса (Реальные Звёзды)</h4>
            <div class="input-group">
                <label for="stars-input">Сколько звёзд Telegram хотите внести?</label>
                <input type="number" id="stars-input" value="1" min="1" oninput="calculateVnt()">
            </div>
            
            <p style="font-size: 13px; color: #666;">К зачислению: <strong id="vnt-calc" style="color: var(--success-color);">1</strong> VNT</p>

            <button class="btn-action" onclick="buyWithRealStars()">Оплатить Звёздами</button>
        </div>

    </div>

    <div id="tab-history" class="tab-content">
        <h3>История операций</h3>
        <div class="history-list" id="history-container"></div>
    </div>
</div>

<script>
    // Инициализируем Telegram WebApp
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    
    // Если открыто внутри Telegram, получаем НАСТОЯЩИЙ профиль пользователя
    let currentUserId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 12345678;
    let currentUsername = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : "Браузерный_Тест";

    if (tg) {
        tg.ready();
        tg.expand(); // Разворачиваем приложение на весь экран телефона
    }

    document.getElementById("username-display").innerText = "@" + currentUsername;
    document.getElementById("userid-display").innerText = currentUserId;

    async function loadProfile() {
        try {
            const response = await fetch('/get_profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUserId })
            });
            if (response.ok) {
                const data = await response.json();
                document.getElementById("balance-value").innerText = data.balance;
                renderHistory(data.history);
            }
        } catch (e) { console.error(e); }
    }

    function renderHistory(history) {
        const container = document.getElementById("history-container");
        container.innerHTML = "";
        if(!history || history.length === 0) {
            container.innerHTML = "<p style='color:#999;'>История пуста</p>";
            return;
        }
        history.slice().reverse().forEach(item => {
            container.innerHTML += `<div class="history-item"><span>${item.type}</span><span style="color:#28a745; font-weight:bold;">${item.amount}</span></div>`;
        });
    }

    function calculateVnt() {
        const val = document.getElementById("stars-input").value;
        document.getElementById("vnt-calc").innerText = parseInt(val) || 0;
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
    }

    // НАСТОЯЩАЯ ОПЛАТА ЗВЁЗДАМИ TELEGRAM
    async function buyWithRealStars() {
        const starsCount = parseInt(document.getElementById("stars-input").value);
        if (!starsCount || starsCount <= 0) {
            alert("Укажите верное количество звёзд!");
            return;
        }

        if (!tg || !tg.initDataUnsafe.user) {
            alert("Реальная оплата звёздами работает только внутри Telegram Mini App!");
            return;
        }

        try {
            // 1. Просим наш бэкенд создать инвойс-ссылку через Bot API
            const response = await fetch('/create_invoice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUserId, stars: starsCount })
            });

            const data = await response.json();
            
            if (data.status === "success" && data.invoice_link) {
                // 2. Открываем нативное окно оплаты звёзд в интерфейсе Telegram
                tg.openInvoice(data.invoice_link, function(status) {
                    if (status === 'paid') {
                        alert("Оплата прошла успешно! Баланс обновится.");
                        // Перезагружаем профиль, чтобы увидеть обновленный баланс
                        setTimeout(loadProfile, 2000);
                    } else if (status === 'cancelled') {
                        alert("Вы отменили оплату.");
                    } else {
                        alert("Ошибка при проведении платежа.");
                    }
                });
            } else {
                alert("Не удалось сгенерировать чек для оплаты.");
            }
        } catch (error) {
            console.error(error);
            alert("Ошибка соединения с бэкендом.");
        }
    }

    loadProfile();
</script>

</body>
</html>
