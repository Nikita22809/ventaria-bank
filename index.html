<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNT Банк</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #4a6fa5;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Анимация плавного появления контейнера */
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            color: var(--accent-color); 
            margin-bottom: 20px; 
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--accent-color);
            font-weight: 600;
            padding: 5px 10px;
            transition: opacity 0.2s;
        }

        .nav-btn:hover {
            opacity: 0.8;
        }

        .tab-content { 
            display: none; 
        }

        /* Анимация сдвига при переключении вкладок */
        .tab-content.active { 
            display: block; 
            animation: slideIn 0.4s ease-out; 
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .balance { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 20px 0; 
            color: #2b2b2b;
        }

        .history-item {
            background: #f1f3f5;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>VNT Банк</h2>
    <div class="nav-bar">
        <button class="nav-btn" onclick="switchTab('main')">Главная</button>
        <button class="nav-btn" onclick="switchTab('history')">История</button>
    </div>

    <div id="tab-main" class="tab-content active">
        <p>Ваш баланс:</p>
        <div class="balance">0 VNT</div>
    </div>

    <div id="tab-history" class="tab-content">
        <h3>История операций</h3>
        <div class="history-list">
            <div class="history-item">
                <span>Пополнение</span>
                <span style="color: #28a745; font-weight: bold;">+500</span>
            </div>
            <div class="history-item">
                <span>Перевод</span>
                <span style="color: #dc3545; font-weight: bold;">-200</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Функция переключения вкладок
    function switchTab(tabId) {
        // Скрываем все вкладки
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });
        // Показываем нужную
        const activeTab = document.getElementById('tab-' + tabId);
        if (activeTab) {
            activeTab.classList.add('active');
        }
    }
</script>

</body>
</html>
